<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pickleball Community</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%2380f20d'/><path fill='%23192210' d='M16 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 10a6 6 0 1 1 0 12 6 6 0 0 1 0-12z'/></svg>"/>
  <!-- For production, replace CDN with Tailwind CLI or PostCSS: https://tailwindcss.com/docs/installation -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#80f20d",
            "background-light": "#f7f8f5",
            "background-dark": "#192210",
          },
          fontFamily: { display: ["Inter", "sans-serif"] },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; min-height: 100dvh; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .active-icon { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display antialiased">
  <div id="root" class="relative mx-auto min-h-screen max-w-md flex flex-col bg-background-light dark:bg-background-dark shadow-xl">
    <main id="main" class="flex-1 flex flex-col overflow-x-hidden pb-24"></main>
    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/95 dark:bg-slate-900/95 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 px-6 pt-2 pb-6 z-30 flex justify-between items-center">
      <a href="#home" data-nav="home" class="nav-link flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">home</span>
        <span class="text-[10px] font-bold uppercase tracking-tight">Home</span>
      </a>
      <a href="#players" data-nav="players" class="nav-link flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">groups</span>
        <span class="text-[10px] font-bold uppercase tracking-tight">Players</span>
      </a>
      <a href="#add-event" class="relative -top-6 flex items-center justify-center bg-primary size-14 rounded-full shadow-xl shadow-primary/40 border-4 border-background-light dark:border-background-dark hover:opacity-90 transition-opacity">
        <span class="material-symbols-outlined text-slate-900 text-3xl font-bold">add</span>
      </a>
      <a href="#chat" data-nav="chat" class="nav-link flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">chat_bubble</span>
        <span class="text-[10px] font-bold uppercase tracking-tight">Chat</span>
      </a>
      <a href="#profile" data-nav="profile" class="nav-link flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-2xl">person</span>
        <span class="text-[10px] font-bold uppercase tracking-tight">Profile</span>
      </a>
    </nav>
  </div>
  <!-- Firebase: load before config/app. Get config from https://console.firebase.google.com/ -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  <link rel="manifest" href="manifest.json"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.local.js"></script>
  <script src="js/config.js"></script>
  <script>window.OneSignalDeferred = window.OneSignalDeferred || [];</script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script src="js/services/geolocation.js"></script>
  <script src="js/services/onesignal.js"></script>
  <script src="js/services/firebase-auth.js"></script>
  <script src="js/services/supabase.js"></script>
  <script src="js/services/notifications.js"></script>
  <script src="js/services/auth.js"></script>
  <script src="js/services/chat.js"></script>
  <script src="js/services/courts-osm.js"></script>
  <script src="js/data.js"></script>
  <script src="js/courts-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
